<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
    
    
    <title>El Pollo Loco</title>
</head>
<body>
    
    <h1>El Pollo Loco</h1>

    <div class="game-container">
        <canvas id="canvas" width="720" height="480"></canvas>

        <div id="startScreen" class="start-screen" onclick="startGame()">
            <img src="assets/9_intro_outro_screens/start/startscreen_1.png" alt="Start El Pollo Loco">
        </div>

        <div id="gameOverScreen" class="end-screen d-none">
            <img src="assets/You won, you lost/Game-Over.png" alt="Game Over">
        </div>

        <div id="winningScreen" class="end-screen d-none">
            <img src="assets/You won, you lost/winning-screen.png" alt="You Won">
        </div>
        
    </div>
    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/bottle.class.js"></script>
    <script src="models/bottle-box.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/clouds.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/charackter.class.js"></script>
    <script src="models/statusbar-coin.class.js"></script>
    <script src="models/statusbar-bottle.class.js"></script>
    <script src="models/statusbar-endboss.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/coin.class.js"></script>
    <script src="level/level1.js"></script>
    <script src="js/game.js"></script>
    <script src="script.js"></script>

</body>
</html>
